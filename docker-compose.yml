version: '3.8'

services:
  webhook-logger:
    image: k1ngerr0r/webhook-logger:latest
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - FLASK_APP=src/app.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5000
      - WEBHOOK_DB_PATH=/data/webhooks.db
